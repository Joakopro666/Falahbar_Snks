<body class="body-reels">
    <!-- HEADER / NAVEGACIÓN -->
    <header class="header header--reels">
        <nav class="nav container">
            <a href="index.html" class="logo" aria-label="Falahbar.SnkS - Inicio">
                <img src="logo.png" alt="Falahbar.SnkS" class="logo-img">
            </a>
            <button class="nav-toggle" id="navToggle" aria-label="Abrir menú" aria-expanded="false">
